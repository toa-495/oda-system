<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>家計経費UI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./favicon.png" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Home Expense</p>
        <h1>家計経費UI</h1>
      </div>
      <button id="refresh-btn" class="icon-btn" aria-label="再読み込み">↻</button>
    </header>

    <main>
      <section class="summary-grid">
        <article class="summary-card">
          <span>今月合計</span><strong id="month-total">-</strong>
        </article>
        <article class="summary-card">
          <span>未精算</span><strong id="unsettled-total">-</strong>
        </article>
      </section>

      <section class="card filter-card">
        <div class="search-wrap">
          <input id="search-input" type="search" placeholder="タイトル・支払者・種別で検索" />
        </div>
        <div class="chip-row" id="payer-filter"></div>
      </section>

      <section class="list-section">
        <div class="section-head">
          <h2>経費一覧</h2>
          <span id="list-count" class="meta">読み込み中</span>
        </div>
        <div id="expense-list" class="expense-list"></div>
      </section>
    </main>

    <button id="add-btn" class="fab" aria-label="新規追加">＋</button>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <section class="modal-panel">
      <header class="modal-head">
        <div>
          <p class="eyebrow" id="modal-mode">New</p>
          <h2 id="modal-title">経費を追加</h2>
        </div>
        <button class="icon-btn" data-close="1">✕</button>
      </header>

      <form id="expense-form" class="expense-form">
        <input type="hidden" id="expense-no" />
        <input type="hidden" id="receipt-url" />
        <input type="hidden" id="receipt-id" />

        <label>タイトル<input id="title-input" type="text" placeholder="例：スーパー買い物" /></label>
        <label>金額<input id="amount-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="半角数字のみ" /></label>
        <label>支払者<select id="payer-input" required></select></label>
        <label>種別<select id="type-input"></select></label>
        <label>日付<input id="date-input" type="date" /></label>
        <label class="check-label"><input id="settled-input" type="checkbox" /> 精算済みにする</label>

        <div class="receipt-box">
          <div>
            <p class="receipt-title">レシート</p>
            <p id="receipt-status" class="meta">未アップロード</p>
          </div>
          <label class="upload-btn">
            撮影 / 選択
            <input id="receipt-input" type="file" accept="image/*,application/pdf" capture="environment" />
          </label>
        </div>
        <a id="receipt-link" class="receipt-link hidden" target="_blank" rel="noopener">レシートを開く</a>

        <p class="hint">支払者は必須。タイトル＋金額、またはレシートのどちらかが必須です。</p>

        <div class="modal-actions">
          <button type="button" id="delete-btn" class="btn-danger hidden">削除</button>
          <div class="spacer"></div>
          <button type="button" class="btn-secondary" data-close="1">閉じる</button>
          <button type="submit" id="save-btn" class="btn-primary">保存</button>
        </div>
      </form>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
